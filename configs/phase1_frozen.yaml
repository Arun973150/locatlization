run_name: phase1_frozen
seed: 0

data:
  train_manifest: data/manifest_train.csv
  val_manifest: data/manifest_val.csv
  image_size: 512            # DINOv3 = patch-16 -> multiple of 16
  reencode_jpeg: true        # shortcut-control normalization ON. Set false + retrain for the AUDIT.
  jpeg_quality: 90

model:
  backbone: facebook/dinov3-vitl16-pretrain-lvd1689m   # GATED — if no access yet use configs/phase1_dinov2.yaml
  pooling: [cls, reg, mean, attn]
  freeze_backbone: true
  grad_checkpointing: false
  lora:
    enabled: false
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: all-linear

train:
  epochs: 6
  batch_size: 128            # frozen forward is memory-light on A100-80GB; drop if OOM
  lr_head: 1.0e-3
  lr_backbone: 1.0e-4        # used only when backbone params are trainable
  weight_decay: 0.05
  warmup_ratio: 0.05
  focal_gamma: 2.0
  focal_alpha: 0.5
  num_workers: 12            # you have 12 vCPU
  amp_dtype: bf16
